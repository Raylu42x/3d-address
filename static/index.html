<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>3D Word Address</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  :root{
    --bg:#faf9f5; --panel:#ffffff; --ink:#1a1915; --muted:#6b6a63;
    --line:#e7e5de; --accent:#1d9e75; --accent2:#137a58; --chip:#f0efe9;
  }
  *{box-sizing:border-box}
  body{margin:0;font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
       background:var(--bg);color:var(--ink)}
  header{padding:32px 22px 18px;border-bottom:1px solid var(--line);background:var(--panel)}
  header h1{margin:0;font-size:20px;font-weight:600;letter-spacing:-0.01em}
  header p{margin:2px 0 0;color:var(--muted);font-size:13px}
  .wrap{display:grid;grid-template-columns:1fr 400px;gap:0;
        height:calc(100vh - 82px);height:calc(100dvh - 82px)}
  #map{height:100%;width:100%;min-height:240px}
  .side{border-left:1px solid var(--line);background:var(--panel);overflow-y:auto;padding:18px;min-width:0}
  .card{border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:14px;min-width:0}
  .card h2{margin:0 0 8px;font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
  label{display:block;font-size:12px;color:var(--muted);margin:8px 0 3px}
  input,select{width:100%;max-width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;
       font:inherit;background:#fff;color:var(--ink);min-width:0}
  .row{display:flex;gap:8px;min-width:0}
  .row>div{flex:1;min-width:0}
  .row>div.narrow{flex:0 0 84px}
  .convertBtn{margin:2px 0 14px;width:100%;padding:12px;border:0;border-radius:10px;background:var(--accent);
       color:#fff;font:inherit;font-weight:600;font-size:16px;cursor:pointer}
  .convertBtn:hover{background:var(--accent2)}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px}
  .status{font-size:12px;margin-top:8px;min-height:16px}
  .status.err{color:#b23b3b}
  .status.ok{color:var(--accent2)}
  .hint{font-size:11px;color:var(--muted);margin-top:4px}
  .badge{display:inline-block;font-size:11px;padding:1px 7px;border-radius:20px;background:var(--chip);color:var(--muted)}
  .altBtn{margin-top:10px;width:100%;padding:9px;border:1px solid var(--line);border-radius:8px;
      background:var(--chip);color:var(--ink);font:inherit;font-size:13px;cursor:pointer}
  .altBtn:hover{border-color:var(--accent)}
  .altItem{border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-top:8px;cursor:pointer;font-size:12px}
  .altItem:hover{border-color:var(--accent);background:var(--chip)}
  .altItem .aw{font-family:ui-monospace,Menlo,monospace;font-size:12px;word-break:break-all}
  .altItem .am{color:var(--muted);margin-top:2px}
  /* autocomplete */
  .ac-wrap{position:relative;min-width:0}
  .ac{position:absolute;top:100%;left:0;right:0;z-index:1000;background:#fff;border:1px solid var(--line);
      border-radius:0 0 10px 10px;box-shadow:0 8px 20px rgba(0,0,0,.08);max-height:220px;overflow-y:auto;display:none}
  .ac div{padding:9px 12px;font-size:13px;cursor:pointer;border-top:1px solid var(--line);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ac div:first-child{border-top:0}
  .ac div:hover,.ac div.sel{background:var(--chip)}
  @media (max-width: 760px){
    header{padding:20px 16px 12px}
    header h1{font-size:18px}
    .wrap{grid-template-columns:1fr;height:auto;min-height:calc(100dvh - 70px)}
    #map{height:42dvh;min-height:280px}
    .side{border-left:0;border-top:1px solid var(--line);padding:14px}
    input,select,.convertBtn{font-size:16px}
  }
</style>
</head>
<body>
<header>
  <h1>3D Word-Based Address</h1>
  <p>Fill in any one form, hit Convert, and get the others</p>
</header>
<div class="wrap">
  <div id="map"></div>
  <div class="side">

    <button class="convertBtn" onclick="convert()">Convert</button>

    <!-- STREET ADDRESS -->
    <div class="card">
      <h2>Street address</h2>
      <div class="ac-wrap">
        <input id="street" placeholder="Washington Monument Wa DC" autocomplete="off">
        <div class="ac" id="streetAC"></div>
      </div>
      <div class="status" id="stStatus"></div>
    </div>

    <!-- WORD ADDRESS -->
    <div class="card">
      <h2>Word address</h2>
      <input id="wordsIn" class="mono" placeholder="trot-viper-ripe-expiate-bafegab-C">
      <label>Precision (words)</label>
      <select id="wordCount">
        <option value="3">3 — ~460 m (block)</option>
        <option value="4">4 — ~15 m (property)</option>
        <option value="5" selected>5 — ~51 cm (door)</option>
        <option value="6">6 — ~1.7 cm</option>
        <option value="7">7 — ~0.6 mm</option>
      </select>
      <div class="hint">up to 7 words + checksum letter · typos auto-correct</div>
      <div class="status" id="woStatus"></div>
      <button class="altBtn" id="altBtn" style="display:none" onclick="showAlternatives()">That doesn't look right?</button>
      <div id="altList"></div>
    </div>

    <!-- GPS -->
    <div class="card">
      <h2>GPS</h2>
      <div class="row">
        <div><label>Latitude</label><input id="lat" type="number" step="any" placeholder="51.5074"></div>
        <div><label>Longitude</label><input id="lon" type="number" step="any" placeholder="-0.1278"></div>
      </div>
      <div class="row">
        <div><label>Altitude <span class="badge">blank = ground</span></label>
          <input id="alt" type="number" step="any" placeholder="ground"></div>
        <div class="narrow"><label>Unit</label>
          <select id="unit">
            <option value="m">m</option><option value="km">km</option>
            <option value="ft">ft</option><option value="mi">mi</option>
          </select>
        </div>
      </div>
      <div class="status" id="gpStatus"></div>
    </div>

  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map', {
  worldCopyJump:true, maxBounds:[[-90,-180],[90,180]], maxBoundsViscosity:1.0
}).setView([51.5074, -0.1278], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  {maxZoom:19, minZoom:2, noWrap:true, attribution:'© OpenStreetMap'}).addTo(map);
let marker = L.marker([51.5074, -0.1278]).addTo(map);
let previewMarker = null;
let cellLayer = null;
let previewAlt = null;

const $=id=>document.getElementById(id);
const FACT={m:1, km:1000, ft:0.3048, mi:1609.344};
function altKmFromBox(){ const v=parseFloat($('alt').value); return isNaN(v)?null:(v*FACT[$('unit').value]/1000); }
function setAltBox(km){ $('alt').value=(km*1000/FACT[$('unit').value]).toFixed(1); }

// track which group the user last edited -> the single Convert routes there
let active='street';
['street'].forEach(i=>$(i).addEventListener('input',()=>active='street'));
$('wordsIn').addEventListener('input',()=>active='words');
['lat','lon','alt'].forEach(i=>$(i).addEventListener('input',()=>active='gps'));

function drawCell(lat,lon,edge_m){
  if(cellLayer) map.removeLayer(cellLayer);
  const dLat=(edge_m/2)/111320, dLon=(edge_m/2)/(111320*Math.cos(lat*Math.PI/180)||1);
  cellLayer=L.rectangle([[lat-dLat,lon-dLon],[lat+dLat,lon+dLon]],
    {color:'#1d9e75',weight:2,fillColor:'#1d9e75',fillOpacity:0.15}).addTo(map);
}
function focusCell(lat,lon,edge){ marker.setLatLng([lat,lon]); drawCell(lat,lon,edge||1);
  map.fitBounds(cellLayer.getBounds(),{maxZoom:19,padding:[60,60]}); }

function setStatus(id,msg,ok){ const el=$(id); el.textContent=msg; el.className='status '+(ok?'ok':'err'); }
function clearStatuses(){ ['stStatus','woStatus','gpStatus'].forEach(i=>{$(i).textContent='';}); }

async function post(url,body){ const r=await fetch(url,{method:'POST',
  headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}); return r.json(); }
async function getJSON(url){ const r=await fetch(url); return r.json(); }
async function elevationKm(lat,lon){
  try{ const d=await getJSON(`https://api.open-meteo.com/v1/elevation?latitude=${lat}&longitude=${lon}`);
    return (d.elevation&&d.elevation[0]!=null)?d.elevation[0]/1000:0; }catch(e){ return 0; }
}

async function fillAll(lat, lon, altKm, opts={}){
  if(altKm==null) altKm=await elevationKm(lat,lon);
  $('lat').value=lat.toFixed(6); $('lon').value=lon.toFixed(6); setAltBox(altKm);
  let edge=opts.edge;
  if(!opts.wordsAlready){
    const enc=await post('/encode',{lat,lon,alt_km:altKm,words:parseInt($('wordCount').value),format:'all'});
    if(!enc.ok){ setStatus(opts.statusId||'gpStatus', enc.error||'outside addressable shell', false); return null; }
    $('wordsIn').value=enc.words; lat=enc.lat; lon=enc.lon; edge=enc.cell_edge_m;
  }
  if(!opts.streetAlready){
    try{ const rev=await getJSON(`/reverse?lat=${lat}&lon=${lon}`);
      $('street').value=(rev.ok&&rev.display_name)?rev.display_name:''; }catch(e){}
  }
  focusCell(lat,lon,edge);
  return {lat,lon,edge};
}

async function fromStreet(){
  const q=$('street').value.trim();
  if(!q){ setStatus('stStatus','enter a street address',false); return; }
  const g=await getJSON(`/geocode?q=${encodeURIComponent(q)}`);
  if(!g.ok){ setStatus('stStatus',g.error||'address not found',false); return; }
  const r=await fillAll(g.lat,g.lon,null,{streetAlready:true,statusId:'stStatus'});
  if(r) setStatus('stStatus','converted · ground level',true);
}
async function fromWords(){
  const a=$('wordsIn').value.trim();
  if(!a){ setStatus('woStatus','enter a word address',false); return; }
  const d=await post('/decode',{address:a});
  if(!d.ok){
    let m='could not resolve';
    if(d.suggestions) m+=' — try: '+Object.values(d.suggestions).map(s=>s[0]).join(', ');
    setStatus('woStatus',m,false); return;
  }
  setStatus('woStatus',(d.corrections&&Object.keys(d.corrections).length)
    ?'corrected: '+JSON.stringify(d.corrections):'converted',true);
  $('wordsIn').value=d.words.join('-')+'-'+a.split('-').pop().toUpperCase();
  await fillAll(d.lat,d.lon,d.alt_km,{wordsAlready:true,edge:d.cell_edge_m,statusId:'woStatus'});
  $('altBtn').style.display='block';   // decoded fine, but user may still doubt it
}

// --- "that doesn't look right" -> ask how far off, then diagnose the bad word ---
let altMarkers=[];
function clearAlts(){
  $('altList').innerHTML='';
  altMarkers.forEach(m=>map.removeLayer(m));
  altMarkers=[];
  previewAlt=null;
  if(previewMarker){
      map.removeLayer(previewMarker);
      previewMarker = null;
  }
}

async function showAlternatives(){
  clearAlts();
  // step 1: ask how far off the shown location looks
  $('altList').innerHTML=`
    <div class="hint" style="margin-top:10px">How far off does the shown location look?</div>
    <div class="altItem" onclick="altBand('close')"><b>Close</b><div class="am">right area, wrong spot — a late word is off</div></div>
    <div class="altItem" onclick="altBand('far')"><b>Far</b><div class="am">wrong town or city — a middle word is off</div></div>
    <div class="altItem" onclick="altBand('veryfar')"><b>Very far</b><div class="am">wrong region or country — an early word is off</div></div>`;
}

async function altBand(band){
  $('altList').innerHTML='<div class="hint" style="margin-top:8px">searching…</div>';
  const a=$('wordsIn').value.trim();
  const res=await post('/alternatives',{address:a});
  let alts=res.alternatives||[];
  // distance from the shown decode diagnoses which word was mistyped
  const inBand = d => band==='close' ? d<10 : band==='far' ? (d>=10&&d<1000) : d>=1000;
  alts=alts.filter(x=>inBand(x.distance_km));
  if(!alts.length){
    $('altList').innerHTML='<div class="hint" style="margin-top:8px">no checksum-valid alternatives in that range — try another distance, or re-check the address with its sender</div>'+
      backBtn(); return;
  }
  const bounds=[[marker.getLatLng().lat, marker.getLatLng().lng]];
  $('altList').innerHTML=alts.map((x,i)=>{
    const [from,to]=Object.entries(x.changed)[0];
    const d=x.distance_km<10?x.distance_km.toFixed(1)+' km':Math.round(x.distance_km).toLocaleString()+' km';
    return `<div class="altItem" data-i="${i}">
      <div class="aw">${x.words}</div>
      <div class="am">word ${x.position+1}: ${from} → ${to} · ${d} away</div></div>`;
  }).join('')+backBtn();
  alts.forEach((x,i)=>{
    const m=L.marker([x.lat,x.lon],{opacity:0.6}).addTo(map).bindTooltip(Object.values(x.changed)[0]);
    m.on('click',()=>previewAltChoice(i));
    altMarkers.push(m); bounds.push([x.lat,x.lon]);
  });
  [...$('altList').children].forEach(el=>{ if(el.dataset.i!=null) el.onclick=()=>previewAltChoice(+el.dataset.i); });
  window._alts=alts;
  map.fitBounds(bounds,{padding:[50,50]});
}
function backBtn(){ return '<div class="altItem" onclick="showAlternatives()" style="text-align:center;color:var(--muted)">← different distance</div>'; }
function previewAltChoice(i){
  const x = window._alts[i];
  if(!x) return;

  previewAlt = x;

  // Highlight selected card
  document.querySelectorAll('#altList .altItem').forEach((el,index)=>{
    if(el.dataset.i==null) return;

    if(index===i){
      el.style.borderColor='var(--accent)';
      el.style.background='var(--chip)';
    }else{
      el.style.borderColor='var(--line)';
      el.style.background='';
    }
  });

  // Preview on map
  if(previewMarker){
      map.removeLayer(previewMarker);
  }

  previewMarker = L.marker([x.lat,x.lon], {
      opacity:0.8
  }).addTo(map);

  map.flyTo([x.lat,x.lon], Math.max(map.getZoom(),17), {
      duration:0.4  
  });
    map.flyTo([x.lat,x.lon], Math.max(map.getZoom(),17), {
      duration:0.4
    });

  // Add confirmation button if needed
  let btn=document.getElementById('useAltBtn');
  if(!btn){
    btn=document.createElement('button');
    btn.id='useAltBtn';
    btn.className='convertBtn';
    btn.textContent='Use this address';
    btn.onclick=commitAltChoice;
    $('altList').appendChild(btn);
  }
}
function commitAltChoice(){
  if(!previewAlt) return;

  $('wordsIn').value = previewAlt.words;
  active='words';

  previewAlt=null;

  clearAlts();
  $('altBtn').style.display='none';

  convert();
}
async function fromGPS(){
  const lat=parseFloat($('lat').value), lon=parseFloat($('lon').value);
  if(isNaN(lat)||isNaN(lon)){ setStatus('gpStatus','enter latitude and longitude',false); return; }
  if(lat<-90||lat>90||lon<-180||lon>180){ setStatus('gpStatus','lat −90…90, lon −180…180',false); return; }
  const altKm=altKmFromBox();
  const r=await fillAll(lat,lon,altKm,{statusId:'gpStatus'});
  if(r) setStatus('gpStatus', altKm==null?'converted · ground level':'converted · 3D altitude', true);
}

// ONE convert button routes to whichever group was last edited
function convert(){ clearStatuses(); hideAC(); clearAlts(); $('altBtn').style.display='none';
  if(active==='words') fromWords();
  else if(active==='gps') fromGPS();
  else fromStreet();
}

// --- street autocomplete (debounced Nominatim suggestions) ---
let acTimer=null, acItems=[], acSel=-1;
const acBox=$('streetAC');
function hideAC(){ acBox.style.display='none'; acItems=[]; acSel=-1; }
function showAC(list){
  acItems=list; acSel=-1;
  acBox.innerHTML=list.map((r,i)=>`<div data-i="${i}">${r.display_name}</div>`).join('');
  acBox.style.display=list.length?'block':'none';
  [...acBox.children].forEach(el=>el.onclick=()=>pickAC(+el.dataset.i));
}
function pickAC(i){
  const r=acItems[i]; if(!r) return;
  $('street').value=r.display_name; hideAC();
  clearStatuses();
  fillAll(parseFloat(r.lat),parseFloat(r.lon),null,{streetAlready:true,statusId:'stStatus'})
    .then(x=>{ if(x) setStatus('stStatus','converted · ground level',true); });
}
$('street').addEventListener('input',()=>{
  active='street';
  clearTimeout(acTimer);
  const q=$('street').value.trim();
  if(q.length<3){ hideAC(); return; }
  acTimer=setTimeout(async()=>{
    try{
      const res=await getJSON(`/geocode_suggest?q=${encodeURIComponent(q)}`);
      showAC(res.ok?res.results:[]);
    }catch(e){ hideAC(); }
  }, 350);
});
$('street').addEventListener('keydown',e=>{
  if(acBox.style.display==='none') { if(e.key==='Enter') convert(); return; }
  if(e.key==='ArrowDown'){ acSel=Math.min(acSel+1,acItems.length-1); }
  else if(e.key==='ArrowUp'){ acSel=Math.max(acSel-1,0); }
  else if(e.key==='Enter'){ e.preventDefault(); if(acSel>=0) pickAC(acSel); else hideAC(); return; }
  else if(e.key==='Escape'){ hideAC(); return; }
  else return;
  [...acBox.children].forEach((el,i)=>el.classList.toggle('sel',i===acSel));
});
document.addEventListener('click',e=>{ if(!acBox.contains(e.target)&&e.target!==$('street')) hideAC(); });

// enter-to-convert on the other inputs
['wordsIn','lat','lon','alt'].forEach(i=>$(i).addEventListener('keydown',e=>{ if(e.key==='Enter') convert(); }));

// map click / locate -> GPS (ground)
function useCoords(lat,lon){ $('lat').value=lat.toFixed(6); $('lon').value=lon.toFixed(6);
  $('alt').value=''; active='gps'; convert(); }
map.on('click', e => useCoords(e.latlng.lat, e.latlng.lng));

const LocateControl=L.Control.extend({
  options:{position:'topleft'},
  onAdd:function(){
    const b=L.DomUtil.create('a','leaflet-bar');
    b.href='#'; b.title='Go to my location';
    b.style.cssText='width:30px;height:30px;background:#fff;display:flex;align-items:center;justify-content:center';
    b.innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#137a58" stroke-width="2"><circle cx="12" cy="12" r="6"/><line x1="12" y1="1" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="23"/><line x1="1" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="23" y2="12"/></svg>';
    L.DomEvent.on(b,'click',L.DomEvent.stop).on(b,'click',()=>{
      if(!navigator.geolocation){ setStatus('gpStatus','geolocation not supported',false); return; }
      navigator.geolocation.getCurrentPosition(
        p=>useCoords(p.coords.latitude,p.coords.longitude),
        e=>setStatus('gpStatus','location failed: '+e.message,false),
        {enableHighAccuracy:true,timeout:10000});
    });
    return b;
  }
});
map.addControl(new LocateControl());

(function(){ const l=(navigator.language||'en').toLowerCase(); $('unit').value=(l==='en-us'||l==='en')?'ft':'m'; })();
</script>
</body>
</html>
